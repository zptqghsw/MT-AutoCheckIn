services:

  mt_autocheckin:
    image: bitwild/mt-autocheckin:latest
    container_name: mt-autocheckin
    build:
      context: .
      dockerfile: ./Dockerfile

    restart: always
    volumes:
      - /etc/timezone:/etc/timezone
      - /etc/hosts:/etc/hosts
    environment:
      - TZ=Asia/Shanghai

      # M-Team 账号信息 (示例：配置两个账户)
      - MTEAM_USERNAME_1=user1
      - MTEAM_PASSWORD_1=pass1
      - MTEAM_TOTP_SECRET_1=totp1
      - NOTIFY_EMAIL_1=user1@example.com

      - MTEAM_USERNAME_2=user2
      - MTEAM_PASSWORD_2=pass2
      - MTEAM_TOTP_SECRET_2=totp2
      - NOTIFY_EMAIL_2=user2@example.com

      # SMTP 邮件通知
      - SMTP_HOST=your_smtp_host
      - SMTP_PORT=your_smtp_port
      - SMTP_USERNAME=your_smtp_username
      - SMTP_PASSWORD=your_smtp_password

      # Telegram 通知
      - TELEGRAM_BOT_TOKEN=your_telegram_bot_token
      - TELEGRAM_CHAT_ID=your_telegram_chat_id

      # 飞书 通知
      - FEISHU_BOT_TOKEN=your_feishu_bot_token

      # 通知类型
      - NOTIFY_TYPE=smtp # smtp, telegram, feishu, none

    command:   ["sh", "-c", "python MT-AutoCheckIn.py"]
    healthcheck:
      test: [ "CMD", "pgrep", "-f", "python MT-AutoCheckIn.py" ]
      interval: 30s
      timeout: 10s
      retries: 3
